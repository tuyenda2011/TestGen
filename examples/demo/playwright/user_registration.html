<!DOCTYPE html>
<html>
<head>
    <title>User Registration</title>
</head>
<body>
    <h2>Account Registration</h2>
    <form id="reg-form">
        <div>
            <label>Username:</label>
            <input type="text" id="username">
        </div>
        <div>
            <label>Email:</label>
            <input type="email" id="email">
        </div>
        <div>
            <label>Password:</label>
            <input type="password" id="password">
        </div>
        <div>
            <label>Confirm Password:</label>
            <input type="password" id="confirm_password">
        </div>
        <div>
            <label>Age:</label>
            <input type="number" id="age">
        </div>
        <div>
            <label>Role:</label>
            <select id="role">
                <option value="user">Standard User</option>
                <option value="editor">Editor</option>
                <option value="admin">Administrator</option>
            </select>
        </div>
        <div>
            <input type="checkbox" id="terms">
            <label for="terms">I agree to the terms and conditions</label>
        </div>
        <button type="button" id="submit-btn">Register</button>
    </form>
    <div id="output" data-testid="message-output"></div>

    <script>
        document.getElementById('submit-btn').addEventListener('click', function(e) {
            e.preventDefault();
            var username = document.getElementById('username').value.trim();
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;
            var confirmPassword = document.getElementById('confirm_password').value;
            var age = parseInt(document.getElementById('age').value, 10);
            var role = document.getElementById('role').value;
            var terms = document.getElementById('terms').checked;
            
            var output = document.getElementById('output');
            
            if (!username || !email || !password) {
                output.innerText = "Error: Required fields cannot be empty";
                output.style.color = "red";
                return;
            }
            
            if (!email.includes("@") || !email.includes(".")) {
                output.innerText = "Error: Invalid email format";
                output.style.color = "red";
                return;
            }
            
            if (password.length < 8) {
                output.innerText = "Error: Password must be at least 8 characters";
                output.style.color = "red";
                return;
            }
            
            if (password !== confirmPassword) {
                output.innerText = "Error: Passwords do not match";
                output.style.color = "red";
                return;
            }
            
            if (isNaN(age) || age < 18) {
                output.innerText = "Error: You must be at least 18 years old";
                output.style.color = "red";
                return;
            }
            
            if (!terms) {
                output.innerText = "Error: You must agree to the terms";
                output.style.color = "red";
                return;
            }
            
            var fee = 0;
            if (role === "editor") fee = 10;
            else if (role === "admin") fee = 50;
            
            output.innerText = "Success: User " + username + " registered with fee $" + fee;
            output.style.color = "green";
        });
    </script>
</body>
</html>
