<!DOCTYPE html>
<html>
<head>
    <title>BMI Calculator</title>
</head>
<body>
    <h2>BMI Calculator</h2>
    <div>
        <label>Weight (kg):</label>
        <input type="number" id="weight">
    </div>
    <div>
        <label>Height (cm):</label>
        <input type="number" id="height">
    </div>
    <button id="calc-btn">Calculate BMI</button>
    <div id="result"></div>

    <script>
        document.getElementById('calc-btn').addEventListener('click', function() {
            var wStr = document.getElementById('weight').value;
            var hStr = document.getElementById('height').value;
            var resultDiv = document.getElementById('result');
            
            if (!wStr || !hStr) {
                resultDiv.innerText = "Please enter both weight and height";
                return;
            }
            
            var weight = parseFloat(wStr);
            var height = parseFloat(hStr);
            
            if (weight <= 0 || height <= 0) {
                resultDiv.innerText = "Values must be greater than zero";
                return;
            }
            
            var heightMeters = height / 100;
            var bmi = weight / (heightMeters * heightMeters);
            
            var category = "";
            if (bmi < 18.5) category = "Underweight";
            else if (bmi < 25) category = "Normal weight";
            else if (bmi < 30) category = "Overweight";
            else category = "Obese";
            
            resultDiv.innerText = "BMI: " + bmi.toFixed(1) + " (" + category + ")";
        });
    </script>
</body>
</html>
